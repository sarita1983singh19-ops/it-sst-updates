<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Note.in — Study Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0b0906; --parchment:#e8dcc4; --parchment-dim:#c9b98f;
    --gold:#c9a24b; --gold-bright:#f0d68c; --ember:#8a3b2b;
    --teal:#3f7d78; --line:rgba(201,162,75,0.24); --green:#5fae72;
    --app-font:'Cinzel', serif; --point-font-size:0.9rem; --glow-intensity:1;
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 15% 0%,rgba(138,59,43,0.14),transparent 55%),
      radial-gradient(ellipse at 85% 10%,rgba(63,125,120,0.10),transparent 55%),
      radial-gradient(ellipse at 80% 100%,rgba(201,162,75,0.10),transparent 60%),
      var(--ink);
    color:var(--parchment); font-family:var(--app-font); overflow-x:hidden;
  }
  /* Heading elements stay in Cinzel Decorative regardless of body font choice */
  .app-name, h1.ch-title, .step-title, .co-title, .sec-title, .part-name, .ch-title{ font-family:'Cinzel Decorative', var(--app-font); }
  .grain{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:0.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
  .vignette{position:fixed;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.65) 100%);}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .star{position:absolute;border-radius:50%;background:var(--gold-bright);animation:twinkle ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:0.15;}50%{opacity:0.85;}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(240,214,140,0.35);}50%{box-shadow:0 0 calc(4px*var(--glow-intensity)) calc(14px*var(--glow-intensity)) rgba(240,214,140,calc(0.35*var(--glow-intensity)));}}
  .badge-glow{ box-shadow:0 0 calc(6px*var(--glow-intensity)) calc(2px*var(--glow-intensity)) rgba(240,214,140,calc(0.5*var(--glow-intensity))); }
  .icon-glow{ filter:drop-shadow(0 0 calc(3px*var(--glow-intensity)) var(--gold-bright)); }
  .point-check.checked{ box-shadow:0 0 calc(10px*var(--glow-intensity)) rgba(240,214,140,calc(0.55*var(--glow-intensity))); }
  .theme-tabs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .theme-tab{ background:transparent; border:1px solid var(--line); color:var(--parchment-dim); font-size:0.62rem; letter-spacing:0.08em; text-transform:uppercase; padding:7px 12px; border-radius:999px; cursor:pointer; transition:border-color .3s ease,color .3s ease; }
  .theme-tab.active{ border-color:var(--gold-bright); color:var(--gold-bright); }
  .theme-tab-panel{ display:none; }
  .theme-tab-panel.active{ display:block; animation:fadeUp .3s ease; }


  .screen{ display:none; min-height:100svh; position:relative; z-index:3; }
  .screen.active{ display:block; }
  #welcomeScreen.active, #partScreen.active, #chapterSelectScreen.active,
  #subjectScreen.active, #ssPartScreen.active, #ssPrincipleScreen.active, #ssChapterSelectScreen.active{ display:flex; }

  /* ===== BUTTONS ===== */
  .btn-glow{
    position:relative; border:1px solid var(--gold); border-radius:2px; background:transparent;
    color:var(--gold-bright); font-family:'Cinzel',serif; letter-spacing:0.3em; text-transform:uppercase;
    cursor:pointer; overflow:hidden; transition:color .4s ease; animation:glowPulse 2.6s ease-in-out infinite;
  }
  .btn-glow::before{ content:''; position:absolute; inset:0; background:var(--gold); transform:scaleX(0); transform-origin:left; transition:transform .4s ease; z-index:-1; }
  .btn-glow:hover{ color:var(--ink); }
  .btn-glow:hover::before{ transform:scaleX(1); }

  /* ===== WELCOME SCREEN ===== */
  #welcomeScreen{ flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 20px; }
  .app-eyebrow{ font-size:0.7rem; letter-spacing:0.5em; color:var(--gold); text-transform:uppercase; margin-bottom:26px; opacity:0; animation:fadeUp 1.2s ease forwards 0.2s; }
  .app-name{
    font-family:'Cinzel Decorative',serif; font-weight:900; font-size:clamp(3.2rem,14vw,8rem); letter-spacing:0.06em; line-height:1;
    background:linear-gradient(180deg,var(--gold-bright) 0%,var(--gold) 50%,var(--ember) 130%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 80px rgba(201,162,75,0.3); margin:0 0 14px; opacity:0; animation:fadeUp 1.4s ease forwards 0.5s;
  }
  .app-fullform{ font-size:clamp(0.75rem,1.6vw,1rem); letter-spacing:0.35em; text-transform:uppercase; color:var(--parchment-dim); margin-bottom:60px; opacity:0; animation:fadeUp 1.3s ease forwards 0.9s; }
  .init-btn{
    padding:22px 60px; font-size:0.95rem; opacity:0; animation:fadeUp 1.3s ease forwards 1.3s, glowPulse 2.6s ease-in-out infinite 1.3s;
    display:inline-flex; align-items:center; gap:14px;
  }
  .init-btn .arrow{ display:inline-block; transition:transform .3s ease; }
  .init-btn:hover .arrow{ transform:translateX(6px); }
  .orbit-ring{ position:absolute; border:1px solid var(--line); border-radius:50%; pointer-events:none; }

  /* ===== SELECT PART SCREEN ===== */
  #partScreen, #chapterSelectScreen, #subjectScreen, #ssPartScreen, #ssPrincipleScreen, #ssChapterSelectScreen{ flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; text-align:center; }
  .step-eyebrow{ font-size:0.68rem; letter-spacing:0.4em; text-transform:uppercase; color:var(--parchment-dim); margin-bottom:14px; }
  .step-title{ font-family:'Cinzel Decorative'; font-size:clamp(1.8rem,5vw,3rem); color:var(--gold-bright); margin-bottom:50px; }
  .part-choices{ display:flex; gap:30px; flex-wrap:wrap; justify-content:center; max-width:820px; }
  .part-card{
    width:320px; padding:44px 30px; border:1px solid var(--line); border-radius:12px; cursor:pointer;
    background:linear-gradient(150deg,rgba(201,162,75,0.06),rgba(0,0,0,0.2)); text-align:left;
    transition:transform .4s ease,border-color .4s ease,box-shadow .4s ease; animation:glowPulse 3.2s ease-in-out infinite;
  }
  .part-card:hover{ transform:translateY(-8px); border-color:var(--gold-bright); box-shadow:0 20px 46px rgba(0,0,0,0.45); }
  .part-card .part-letter{ font-family:'Cinzel Decorative'; font-size:2.6rem; color:var(--gold); margin-bottom:16px; }
  .part-card .part-name{ font-size:1.2rem; font-weight:700; color:var(--gold-bright); margin-bottom:10px; }
  .part-card .part-desc{ font-size:0.82rem; color:var(--parchment-dim); line-height:1.7; }
  .part-card.partB{ animation-delay:0.3s; }
  .part-card.partB .part-letter{ color:var(--teal); }
  .part-card.partB .part-name{ color:#a9d6d1; }
  .part-card.partB:hover{ border-color:#a9d6d1; }

  .back-link{ margin-top:44px; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--parchment-dim); cursor:pointer; border-bottom:1px dotted var(--parchment-dim); padding-bottom:2px; }
  .back-link:hover{ color:var(--gold-bright); border-color:var(--gold-bright); }

  /* ===== CHAPTER SELECT ===== */
  .chapter-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:20px; max-width:1000px; width:100%; }
  .ch-card{ position:relative; border:1px solid var(--line); border-radius:10px; padding:26px 22px; text-align:left; min-height:170px;
    background:linear-gradient(150deg,rgba(201,162,75,0.05),rgba(0,0,0,0.15)); }
  .ch-card.ready{ cursor:pointer; animation:glowPulse 2.8s ease-in-out infinite; transition:transform .4s ease,border-color .4s ease; }
  .ch-card.ready:hover{ transform:translateY(-6px); border-color:var(--gold-bright); }
  .ch-card.locked{ opacity:0.4; filter:blur(1.4px); cursor:not-allowed; }
  .ch-card .ch-num{ font-family:'Cinzel Decorative'; font-size:2rem; color:var(--gold); opacity:0.85; margin-bottom:10px; }
  .ch-card .ch-title{ font-size:1.02rem; font-weight:700; color:var(--gold-bright); margin-bottom:6px; line-height:1.3; }
  .ch-card .ch-badge{ position:absolute; top:16px; right:16px; font-size:0.58rem; letter-spacing:0.14em; text-transform:uppercase; padding:3px 9px; border-radius:999px; border:1px solid var(--gold); color:var(--gold-bright); box-shadow:0 0 calc(6px*var(--glow-intensity)) rgba(240,214,140,calc(0.4*var(--glow-intensity))); }
  .ch-card.locked .ch-badge{ border-color:var(--line); color:var(--parchment-dim); }
  .ch-card.locked .ch-num, .ch-card.locked .ch-title{ color:var(--parchment-dim); }

  /* ===== CHAPTER VIEW ===== */
  #chapterView{ }
  #chapterView .ch-hero{ min-height:70svh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:60px 20px 30px; }
  #chapterView .ch-eyebrow{ font-size:0.7rem; letter-spacing:0.45em; color:var(--gold); text-transform:uppercase; margin-bottom:20px; }
  #chapterView .ch-num-big{ font-family:'Cinzel Decorative'; font-size:0.95rem; letter-spacing:0.2em; color:var(--parchment-dim); margin-bottom:10px; text-transform:uppercase; }
  #chapterView h1.ch-title{ font-family:'Cinzel Decorative',serif; font-weight:900; font-size:clamp(2.1rem,6vw,4.4rem); line-height:1.05; margin:0 0 16px; letter-spacing:0.02em;
    background:linear-gradient(180deg,var(--gold-bright) 0%,var(--gold) 55%,var(--ember) 130%); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #chapterView .ch-sub{ font-size:0.85rem; letter-spacing:0.15em; color:var(--parchment-dim); text-transform:uppercase; margin-bottom:20px; }
  #chapterView .ch-read-time{ font-size:0.7rem; color:var(--parchment-dim); letter-spacing:0.1em; }

  #chMain{ max-width:880px; margin:0 auto; padding:0 24px 160px; position:relative; }
  .section{ padding:70px 0; border-bottom:1px solid var(--line); }
  .section:last-child{ border-bottom:none; }
  .sec-head{ display:flex; align-items:baseline; gap:16px; margin-bottom:34px; justify-content:space-between; }
  .sec-index{ font-family:'Cinzel Decorative'; font-size:1.5rem; color:var(--ember); opacity:0.85; min-width:40px; }
  .sec-title{ font-size:clamp(1.2rem,3vw,1.7rem); font-weight:700; color:var(--gold-bright); flex:1; }
  .sec-progress{ font-size:0.65rem; color:var(--parchment-dim); letter-spacing:0.1em; white-space:nowrap; }

  @keyframes floatCard{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-4px); } }
  @keyframes cardGlow{ 0%,100%{ box-shadow:0 0 0 rgba(240,214,140,0); } 50%{ box-shadow:0 8px 28px rgba(240,214,140,0.12); } }

  .point-wrap{ display:flex; gap:14px; align-items:flex-start; padding:18px 20px; border:1px solid var(--line); border-radius:10px; margin:0 0 16px 6px;
    background:linear-gradient(150deg,rgba(201,162,75,0.04),rgba(0,0,0,0.12));
    animation:floatCard 6s ease-in-out infinite, cardGlow 6s ease-in-out infinite;
    transition:border-color .4s ease, transform .3s ease;
  }
  .point-wrap:hover{ border-color:var(--gold); transform:translateY(-3px); animation-play-state:paused; }
  .point-wrap:nth-child(2n){ animation-delay:0.6s; }
  .point-wrap:nth-child(3n){ animation-delay:1.2s; }
  .point-check{
    flex-shrink:0; width:26px; height:26px; border-radius:50%; border:1.5px solid var(--line); margin-top:2px;
    display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:0.75rem; color:transparent;
    transition:border-color .4s ease,background .4s ease,color .4s ease,transform .2s ease;
  }
  .point-check:hover{ transform:scale(1.1); border-color:var(--gold); }
  .point-check.checked{ background:var(--gold-bright); border-color:var(--gold-bright); color:var(--ink); }
  .point-check.dwell-ok:not(.checked){ border-color:var(--teal); }
  .point-body{ flex:1; font-size:var(--point-font-size, 0.9rem); line-height:1.75; color:var(--parchment); cursor:pointer; }
  .point-body b{ color:var(--gold-bright); font-weight:600; }
  .point-status{ font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--parchment-dim); margin-top:6px; opacity:0.7; }
  .point-status .dot{ display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--line); margin-right:5px; vertical-align:middle; }
  .point-status .dot.on{ background:var(--teal); }
  .ex-toggle{ display:inline-block; margin-left:8px; font-size:0.64rem; letter-spacing:0.12em; color:var(--ember); text-transform:uppercase; border-bottom:1px dotted var(--ember); }
  .ex-box{ max-height:0; overflow:hidden; opacity:0; transition:max-height .5s ease,opacity .4s ease,margin .4s ease; font-size:0.85rem; color:var(--parchment-dim); border-left:2px solid var(--ember); padding-left:14px; }
  .point-body.open .ex-box{ max-height:200px; opacity:1; margin-top:10px; }
  .point-body.open .ex-toggle{ color:var(--gold-bright); }

  .ch-seal{ text-align:center; padding:60px 0 10px; opacity:0.75; }
  .ch-seal-mark{ width:56px; height:56px; margin:0 auto 18px; border:1px solid var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Cinzel Decorative'; color:var(--gold); font-size:1.1rem; }
  .ch-seal p{ font-size:0.7rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--parchment-dim); }

  .reveal{ opacity:0; transform:translateY(24px); transition:opacity .9s ease,transform .9s ease; }
  .reveal.in{ opacity:1; transform:translateY(0); }

  /* ===== FEEDBACK ===== */
  #feedbackBlock{ max-width:600px; margin:0 auto; padding:70px 24px 40px; text-align:center; }
  #feedbackBlock .sec-title{ display:block; margin-bottom:10px; }
  .fb-note{ font-size:0.8rem; color:var(--parchment-dim); margin-bottom:30px; line-height:1.7; }
  .fb-field{ width:100%; margin-bottom:16px; background:transparent; border:none; border-bottom:1px solid var(--line); color:var(--parchment); font-family:'Cinzel',serif; font-size:0.95rem; padding:12px 4px; outline:none; transition:border-color .3s; }
  .fb-field:focus{ border-color:var(--gold); }
  textarea.fb-field{ resize:vertical; min-height:90px; }
  .fb-saved-note{ margin-top:16px; font-size:0.75rem; color:var(--teal); display:none; }
  .fb-saved-note.show{ display:block; }
  .fb-list{ margin-top:30px; text-align:left; max-height:200px; overflow-y:auto; }
  .fb-item{ font-size:0.78rem; color:var(--parchment-dim); border-left:2px solid var(--gold); padding:8px 14px; margin-bottom:10px; }
  .fb-item b{ color:var(--gold-bright); }

  /* ===== TOP BAR (chapter view) ===== */
  .top-bar{ position:fixed; top:0; left:0; right:0; z-index:60; display:flex; align-items:center; justify-content:space-between; padding:16px 22px; pointer-events:none; }
  .top-bar > *{ pointer-events:auto; }
  .home-btn, .gear-btn{ width:42px; height:42px; border-radius:50%; background:rgba(21,16,9,0.6); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--parchment-dim); font-size:1rem; backdrop-filter:blur(6px); transition:border-color .3s,color .3s; animation:glowPulse 3.4s ease-in-out infinite; }
  .home-btn:hover, .gear-btn:hover{ border-color:var(--gold); color:var(--gold-bright); }
  #chProgressBar{ position:fixed; top:0; left:0; height:2px; width:0%; background:linear-gradient(90deg,var(--ember),var(--gold-bright)); z-index:61; transition:width .1s linear; }

  /* ===== SETTINGS PANEL ===== */
  #settingsPanel{
    position:fixed; top:0; right:-340px; width:320px; height:100%; z-index:80;
    background:rgba(11,9,6,0.97); border-left:1px solid var(--line); padding:80px 26px 26px;
    transition:right .5s ease; overflow-y:auto; backdrop-filter:blur(10px);
  }
  #settingsPanel.open{ right:0; }
  #settingsOverlay{ position:fixed; inset:0; z-index:79; background:rgba(0,0,0,0.5); opacity:0; visibility:hidden; transition:opacity .4s ease,visibility .4s ease; }
  #settingsOverlay.show{ opacity:1; visibility:visible; }
  .settings-title{ font-size:1.1rem; color:var(--gold-bright); letter-spacing:0.1em; margin-bottom:30px; }
  .setting-row{ margin-bottom:28px; }
  .setting-label{ font-size:0.68rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--parchment-dim); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
  .setting-control{ display:flex; align-items:center; gap:12px; }
  .toggle-switch{ width:46px; height:24px; border-radius:999px; background:var(--line); position:relative; cursor:pointer; transition:background .3s ease; flex-shrink:0; }
  .toggle-switch.on{ background:var(--gold); }
  .toggle-switch .knob{ position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:var(--parchment); transition:left .3s ease; }
  .toggle-switch.on .knob{ left:25px; background:var(--ink); }
  .settings-slider{ width:100%; accent-color:var(--gold); cursor:pointer; }
  .settings-close{ position:absolute; top:24px; right:24px; cursor:pointer; color:var(--parchment-dim); font-size:1.2rem; }
  .settings-close:hover{ color:var(--gold-bright); }
  .settings-divider{ border:none; border-top:1px solid var(--line); margin:26px 0; }
  .font-opt{
    padding:8px 14px; border:1px solid var(--line); border-radius:999px; background:transparent;
    color:var(--parchment-dim); font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:0.08em;
    cursor:pointer; transition:border-color .3s ease,color .3s ease,background .3s ease;
  }
  .font-opt:hover{ border-color:var(--gold); color:var(--gold-bright); }
  .font-opt.active{ background:var(--gold-bright); border-color:var(--gold-bright); color:var(--ink); }

  /* ===== TRACKER SUMMARY ===== */
  #trackerBadge{ position:fixed; bottom:22px; right:22px; z-index:55; background:rgba(21,16,9,0.75); border:1px solid var(--line); border-radius:999px; padding:10px 18px; font-size:0.65rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--parchment-dim); backdrop-filter:blur(6px); }
  #trackerBadge b{ color:var(--gold-bright); }

  /* ===== CONGRATS OVERLAY ===== */
  #congratsOverlay{ position:fixed; inset:0; z-index:95; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; background:rgba(11,9,6,0.95); backdrop-filter:blur(5px); opacity:0; visibility:hidden; transition:opacity 1s ease,visibility 1s ease; padding:20px; }
  #congratsOverlay.show{ opacity:1; visibility:visible; }
  .co-badge{ width:100px; height:100px; border-radius:50%; border:1px solid var(--gold); display:flex; align-items:center; justify-content:center; margin-bottom:26px; font-size:2.2rem; color:var(--gold-bright); animation:glowPulse 2.4s ease-in-out infinite; }
  .co-title{ font-family:'Cinzel Decorative'; font-weight:900; font-size:clamp(1.8rem,5vw,3rem); background:linear-gradient(180deg,var(--gold-bright) 0%,var(--gold) 60%,var(--ember) 140%); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:16px; }
  .co-sub{ font-size:0.9rem; letter-spacing:0.05em; color:var(--parchment-dim); max-width:420px; line-height:1.8; margin-bottom:34px; }
  #confettiCanvas{ position:fixed; inset:0; z-index:96; pointer-events:none; }

  @media (max-width:640px){
    .part-choices{ flex-direction:column; align-items:center; }
    #settingsPanel{ width:100%; right:-100%; }
    .sec-progress{ display:none; }
  }

  /* ===== TOC DRAWER ===== */
  #tocDrawer{ position:fixed; top:0; left:-300px; width:280px; height:100%; z-index:80; background:rgba(11,9,6,0.97); border-right:1px solid var(--line); padding:80px 22px 26px; transition:left .5s ease; overflow-y:auto; backdrop-filter:blur(10px); }
  #tocDrawer.open{ left:0; }
  #tocOverlay{ position:fixed; inset:0; z-index:79; background:rgba(0,0,0,0.5); opacity:0; visibility:hidden; transition:opacity .4s ease,visibility .4s ease; }
  #tocOverlay.show{ opacity:1; visibility:visible; }
  .toc-title{ font-size:1.05rem; color:var(--gold-bright); letter-spacing:0.1em; margin-bottom:24px; }
  .toc-item{ padding:11px 4px; font-size:0.82rem; color:var(--parchment-dim); border-bottom:1px solid var(--line); cursor:pointer; transition:color .3s ease,padding-left .3s ease; }
  .toc-item:hover{ color:var(--gold-bright); padding-left:10px; }
  .toc-close{ position:absolute; top:24px; right:24px; cursor:pointer; color:var(--parchment-dim); font-size:1.2rem; }
  .toc-close:hover{ color:var(--gold-bright); }

  /* ===== BACK TO TOP ===== */
  #backToTop{ position:fixed; bottom:22px; left:22px; z-index:55; width:44px; height:44px; border-radius:50%; background:rgba(21,16,9,0.75); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--gold-bright); font-size:1rem; backdrop-filter:blur(6px); opacity:0; visibility:hidden; transition:opacity .4s ease,visibility .4s ease,border-color .3s ease; }
  #backToTop.show{ opacity:1; visibility:visible; }
  #backToTop:hover{ border-color:var(--gold); }

  /* ===== SEARCH ===== */
  #searchBox{ position:fixed; top:70px; left:50%; transform:translateX(-50%); z-index:60; width:min(420px,86vw); display:none; }
  #searchBox.open{ display:block; }
  #searchInput{ width:100%; padding:12px 18px; border-radius:999px; border:1px solid var(--gold); background:rgba(11,9,6,0.9); color:var(--parchment); font-family:var(--app-font); font-size:0.85rem; outline:none; backdrop-filter:blur(8px); }
  .search-match{ outline:2px solid var(--gold-bright); outline-offset:3px; }

  /* ===== BOOKMARK ===== */
  .bookmark-star{ flex-shrink:0; width:22px; height:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--line); font-size:1rem; margin-top:2px; transition:color .3s ease,transform .2s ease; }
  .bookmark-star:hover{ transform:scale(1.15); }
  .bookmark-star.marked{ color:var(--gold-bright); }

  /* ===== NEXT CHAPTER ===== */
  .next-ch-wrap{ text-align:center; padding:20px 0 10px; }

  /* ===== DUAL LIQUID GAUGE ===== */
  #liquidGauge{ position:fixed; bottom:22px; right:22px; z-index:55; width:74px; height:74px; border-radius:50%; border:2px solid var(--line); overflow:hidden; cursor:pointer; background:rgba(21,16,9,0.5); backdrop-filter:blur(6px); }
  #liquidGauge .liquid{ position:absolute; left:0; right:0; bottom:0; transition:height 1s ease; }
  #liquidGauge .liquid-app{ background:linear-gradient(180deg, var(--gold-bright), var(--gold)); opacity:0.75; height:0%; z-index:1; }
  #liquidGauge .liquid-copy{ background:linear-gradient(180deg, #7fd8ce, var(--teal)); opacity:0.6; height:0%; mix-blend-mode:screen; z-index:2; }
  #liquidGauge .gauge-label{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:0.62rem; font-weight:700; color:var(--parchment); z-index:3; text-shadow:0 1px 3px rgba(0,0,0,0.6); }
  #copyProgressPopover{ position:fixed; bottom:104px; right:22px; z-index:56; background:rgba(11,9,6,0.96); border:1px solid var(--line); border-radius:12px; padding:20px; width:230px; display:none; backdrop-filter:blur(8px); }
  #copyProgressPopover.open{ display:block; }
  #copyProgressPopover .cp-title{ font-size:0.72rem; letter-spacing:0.1em; color:var(--gold-bright); margin-bottom:12px; }
  #copyProgressPopover .cp-legend{ font-size:0.62rem; color:var(--parchment-dim); margin-top:10px; line-height:1.7; }
  #copyProgressPopover .cp-legend span{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px; vertical-align:middle; }

  /* ===== QUIZ ===== */
  #quizBlock{ max-width:680px; margin:0 auto; padding:70px 24px 20px; }
  .quiz-q{ margin-bottom:30px; padding:22px; border:1px solid var(--line); border-radius:10px; background:linear-gradient(150deg,rgba(201,162,75,0.04),rgba(0,0,0,0.12)); }
  .quiz-q-text{ font-size:0.95rem; color:var(--parchment); margin-bottom:16px; line-height:1.6; }
  .quiz-opt{ display:block; padding:10px 14px; border:1px solid var(--line); border-radius:6px; margin-bottom:8px; cursor:pointer; font-size:0.85rem; color:var(--parchment-dim); transition:border-color .3s ease,color .3s ease,background .3s ease; }
  .quiz-opt:hover{ border-color:var(--gold); color:var(--parchment); }
  .quiz-opt.selected{ border-color:var(--gold); background:rgba(201,162,75,0.1); color:var(--gold-bright); }
  .quiz-opt.correct{ border-color:var(--teal); background:rgba(63,125,120,0.18); color:#a9d6d1; }
  .quiz-opt.wrong{ border-color:var(--ember); background:rgba(138,59,43,0.18); color:#e5a190; }
  #quizResult{ text-align:center; font-size:1.1rem; color:var(--gold-bright); margin-top:20px; display:none; }
  #quizResult.show{ display:block; }

  /* ===== ACCENT COLOR PICKER ===== */
  .accent-dot{ width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .2s ease,border-color .2s ease; }
  .accent-dot:hover{ transform:scale(1.15); }
  .accent-dot.active{ border-color:var(--parchment); }

  /* ===== OVERALL PROGRESS (welcome/chapter-select) ===== */
  .overall-progress{ margin-top:34px; font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--parchment-dim); }
  .overall-progress b{ color:var(--gold-bright); }
  .overall-bar{ width:220px; height:4px; border-radius:999px; background:var(--line); margin:8px auto 0; overflow:hidden; }
  .overall-bar-fill{ height:100%; background:linear-gradient(90deg,var(--ember),var(--gold-bright)); transition:width 1s ease; }
  .mini-liquid-gauge{ position:relative; width:96px; height:96px; border-radius:50%; border:2px solid var(--line); overflow:hidden; margin:36px auto 0; background:rgba(21,16,9,0.5); }
  .mini-liquid-gauge .liquid{ position:absolute; left:0; right:0; bottom:0; transition:height 1s ease; background:linear-gradient(180deg, var(--gold-bright), var(--gold)); opacity:0.8; }
  .mini-liquid-gauge .gauge-label{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:0.85rem; font-weight:700; color:var(--parchment); text-shadow:0 1px 3px rgba(0,0,0,0.6); }
  .part-card.locked-card{ opacity:0.4; filter:blur(1.4px); cursor:not-allowed; }
  .part-card.selected{ border-color:var(--gold-bright); box-shadow:0 0 0 2px var(--gold-bright) inset; }

  /* ===== DAY MODE ===== */
  body.day-mode{
    --ink:#f4ecd8; --parchment:#2a2013; --parchment-dim:#5c4a2e;
    --gold:#8a3b2b; --gold-bright:#6b2e1f; --ember:#8a3b2b; --line:rgba(90,60,30,0.25);
  }
  body.day-mode .app-name, body.day-mode #chapterView h1.ch-title{
    background:linear-gradient(180deg,#5c2a1a 0%,#8a3b2b 55%,#3d1a10 130%);
    -webkit-background-clip:text; background-clip:text;
  }
  body.day-mode .grain{ opacity:0.03; }
  body.day-mode .star{ background:#8a3b2b; }
/* ===== ADVANCED EFFECTS PACK ===== */
@media(hover:hover) and (pointer:fine){ html,body,a,button{cursor:none !important;} }
#advCursorRing{position:fixed;width:34px;height:34px;border:1.5px solid var(--gold-bright);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .18s,height .18s,border-color .18s;mix-blend-mode:screen;box-shadow:0 0 12px rgba(240,214,140,.5);}
#advCursorDot{position:fixed;width:5px;height:5px;background:var(--gold-bright);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);box-shadow:0 0 8px var(--gold-bright);}
#advCursorRing.hovering{width:50px;height:50px;border-color:var(--ember);}
#advScrollProgress{position:fixed;top:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,var(--gold),var(--ember),var(--teal));z-index:99998;box-shadow:0 0 10px rgba(201,162,75,.7);}
.adv-ripple{position:absolute;border-radius:50%;background:rgba(240,214,140,.4);transform:scale(0);animation:advRippleAnim .6s ease-out forwards;pointer-events:none;}
@keyframes advRippleAnim{to{transform:scale(3);opacity:0;}}

#updateBadge{position:fixed;bottom:22px;right:22px;z-index:99500;display:none;align-items:center;gap:12px;
  background:linear-gradient(135deg,var(--gold),var(--gold-bright));color:#241a08;border-radius:50px;padding:13px 20px;
  font-family:'Cinzel Decorative',serif;font-size:12.5px;letter-spacing:.5px;box-shadow:0 12px 30px -6px rgba(201,162,75,.6);
  cursor:pointer;animation:advUpdatePulse 2s ease-in-out infinite;}
#updateBadge.show{display:flex;}
@keyframes advUpdatePulse{0%,100%{box-shadow:0 12px 30px -6px rgba(201,162,75,.6);}50%{box-shadow:0 16px 40px -4px rgba(201,162,75,.9);}}
#updateBadge .adv-dot{width:8px;height:8px;border-radius:50%;background:#241a08;animation:advBlink 1.2s infinite;}
@keyframes advBlink{0%,100%{opacity:1}50%{opacity:.25}}
#updateOverlay{position:fixed;inset:0;background:rgba(4,3,1,.9);backdrop-filter:blur(6px);z-index:99999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#updateOverlay.show{display:flex;}
#updateOverlay .spin{width:52px;height:52px;border:3px solid rgba(240,214,140,.2);border-top-color:var(--gold-bright);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#updateOverlay p{font-family:'Cinzel Decorative',serif;color:var(--parchment);letter-spacing:1px;font-size:13px;}

</head>

let dwellTimers = {};
const DWELL_MIN = 15;   // shortest possible required dwell time (seconds)
const DWELL_MAX = 120;  // hard cap — max 2 minutes, however long the point is
function dwellThresholdFor(text){
  if(!text) return DWELL_MIN;
  const words = text.replace(/<[^>]*>/g,'').trim().split(/\s+/).filter(Boolean).length;
  // 5s reading time per word, clamped between DWELL_MIN and DWELL_MAX
  const secs = Math.round(words * 5);
  return Math.min(DWELL_MAX, Math.max(DWELL_MIN, secs));
}

/* ============================================================
   BACKUP / RESTORE — carries progress between downloaded copies
   ============================================================ */
function collectBackupData(){
  const data = {};
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.indexOf('ito_') === 0){ data[k] = localStorage.getItem(k); }
  }
  return data;
}
function exportProgressData(){
  const data = collectBackupData();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'note-in-progress-backup.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  const note = document.getElementById('backupSavedNote');
  if(note){ note.textContent = 'Backup file downloaded!'; note.classList.add('show'); setTimeout(()=>note.classList.remove('show'), 3000); }
}
function importProgressData(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      Object.keys(data).forEach(k=>{
        if(k.indexOf('ito_') === 0){ localStorage.setItem(k, data[k]); }
      });
      computeOverallProgress();
      const note = document.getElementById('backupSavedNote');
      if(note){ note.textContent = 'Progress restored successfully!'; note.classList.add('show'); setTimeout(()=>note.classList.remove('show'), 3000); }
      if(currentChapter){ openChapter(currentChapter); }
    }catch(err){
      alert('Could not read this backup file. Please choose a valid Note.in backup JSON.');
    }
  };
  reader.readAsText(file);
}
function hasAnySavedProgress(){
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k && k.indexOf('ito_') === 0) return true;
  }
  return false;
}

function psKey(num){ return 'ito_pointstates_ch' + num; }
function loadPointStates(num){
  try{
    const raw = localStorage.getItem(psKey(num));
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
function savePointStates(){

    localStorage.setItem(psKey(currentChapter), JSON.stringify(pointStates));
  }catch(e){}
}
function restoreVisualState(){

  el.classList.toggle('checked', st.checked);
  updatePointStatus(pid);
  updateTrackerBadge();

  savePointStates();
  computeOverallProgress();

function updatePointStatus(pid){
  const st = pointStates[pid];
  const statusEl = document.getElementById('status_' + pid);
  const dotEl = document.getElementById('dot_' + pid);
  if(st.dwellOk && st.checked){
    statusEl.innerHTML = '<span class="dot on" style="background:var(--gold-bright)"></span>Fully verified';
  } else if(st.dwellOk){
    statusEl.innerHTML = '<span class="dot on"></span>Time-read verified — tap circle to confirm';
  } else if(st.checked){
    statusEl.innerHTML = '<span class="dot"></span>Marked — keep this on screen a little longer';
  } else {
    statusEl.innerHTML = '<span class="dot"></span>Reading in progress';
  }
}

function setupObservers(){
  const wraps = document.querySelectorAll('.point-wrap');
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(en=>{
      const pid = en.target.getAttribute('data-pid');
      if(en.isIntersecting){
        if(!dwellTimers[pid]){
          dwellTimers[pid] = setInterval(()=>{
            const st = pointStates[pid];
            if(!st.dwellOk){
              st.dwellSeconds += 1;
              if(st.dwellSeconds % 5 === 0) savePointStates(); // periodic save so a refresh resumes, not restarts
              if(st.dwellSeconds >= (st.threshold || DWELL_MAX)){
                st.dwellOk = true;
                document.getElementById('check_'+pid).classList.add('dwell-ok');
                updatePointStatus(pid);
                updateTrackerBadge();
                checkAllComplete();
                savePointStates();
                computeOverallProgress();
              }
            }
          }, 1000);
        }
      } else {
        savePointStates();
        if(dwellTimers[pid]){ clearInterval(dwellTimers[pid]); dwellTimers[pid] = null; }
      }
    });
  }, {threshold:0.5});
  wraps.forEach(w=>io.observe(w));
}

function updateTrackerBadge(){
  const ids = Object.keys(pointStates);
  const verified = ids.filter(id => pointStates[id].dwellOk && pointStates[id].checked).length;
  document.getElementById('trackerCount').textContent = verified;
  document.getElementById('trackerTotal').textContent = ids.length;
  const appPct = ids.length ? Math.round((verified/ids.length)*100) : 0;

}

function fireConfetti(){
  const canvas = document.getElementById('confettiCanvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#f0d68c','#c9a24b','#8a3b2b','#3f7d78','#e8dcc4'];
  let particles = [];
  for(let i=0;i<140;i++){
    particles.push({
      x: Math.random()*canvas.width, y: -20 - Math.random()*canvas.height*0.5,
      vx: (Math.random()-0.5)*3, vy: 2+Math.random()*3,
      size: 4+Math.random()*5, color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random()*360, vrot:(Math.random()-0.5)*10
    });
  }
  let frame = 0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x += p.vx; p.y += p.vy; p.rot += p.vrot; p.vy += 0.02;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color; ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
      ctx.restore();
    });
    frame++;
    if(frame < 220){ requestAnimationFrame(draw); }
    else { ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  draw();
}

/* ============================================================
   OVERALL UNIVERSE PROGRESS (shown on Welcome screen)
   ============================================================ */
function verifiedCountFor(key){
  const st = loadPointStates(key);
  return Object.values(st).filter(s=>s.dwellOk && s.checked).length;
}
function computeOverallProgress(){
  let totalPoints = 0, totalVerified = 0;
  Object.keys(CHAPTERS).forEach(numStr=>{
    const num = parseInt(numStr,10);
    const ch = CHAPTERS[num];
    if(!ch.ready) return;
    let pts = 0;
    ch.sections.forEach(s=>pts += s.points.length);
    totalPoints += pts;
    totalVerified += verifiedCountFor(num);
  });
  Object.keys(SS_CHAPTERS).forEach(key=>{
    const ch = SS_CHAPTERS[key];
    if(!ch.ready) return;
    let pts = 0;
    ch.sections.forEach(s=>pts += s.points.length);
    totalPoints += pts;
    totalVerified += verifiedCountFor(key);
  });
  const pct = totalPoints ? Math.round((totalVerified/totalPoints)*100) : 0;
  document.getElementById('overallPercent').textContent = pct + '%';
  const gaugeFill = document.getElementById('overallLiquidFill');
  const gaugeLabel = document.getElementById('overallGaugeLabel');
  if(gaugeFill){ gaugeFill.style.height = pct + '%'; }
  if(gaugeLabel){ gaugeLabel.textContent = pct + '%'; }
}

/* ============================================================
   SOUND EFFECTS (Web Audio API — no external files needed)
   ============================================================ */
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  return audioCtx;
}
function playTick(){
  try{
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.15);
  }catch(e){}
}
function playFanfare(){
  try{
    const ctx = getAudioCtx();
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((freq, i)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle'; osc.frequency.value = freq;
      const start = ctx.currentTime + i*0.14;
      gain.gain.setValueAtTime(0.001, start);
      gain.gain.linearRampToValueAtTime(0.15, start+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, start+0.4);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(start); osc.stop(start+0.4);
    });
  }catch(e){}
}

      o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+dur);
    }catch(e){}
  }
  document.addEventListener('click',e=>{
    const el = e.target.closest('button,.quiz-opt,.theme-tab');
    if(!el) return;
    beep(420,0.06,0.03);
    const rect = el.getBoundingClientRect();
    const r = document.createElement('span'); r.className='adv-ripple';
    const size = Math.max(rect.width,rect.height);
    r.style.width=r.style.height=size+'px';
    r.style.left=(e.clientX-rect.left-size/2)+'px';
    r.style.top=(e.clientY-rect.top-size/2)+'px';
    if(getComputedStyle(el).position==='static') el.style.position='relative';
    el.style.overflow='hidden'; el.appendChild(r);
    setTimeout(()=>r.remove(),650);
  });

  let ticking=false;
  const bar=document.getElementById('advScrollProgress');
  window.addEventListener('scroll',()=>{
    if(!ticking){ requestAnimationFrame(()=>{
      const h=document.documentElement;
      const pct=(h.scrollTop)/(h.scrollHeight-h.clientHeight)*100;
      bar.style.width=(isFinite(pct)?pct:0)+'%'; ticking=false;
    }); ticking=true; }
  },{passive:true});
})();

/* ===== SELF-UPDATE SYSTEM =====
   Nothing here shows or does anything unless the manifest explicitly
   sets "enabled": true AND ships a version newer than CURRENT_VERSION.
   Until then this file behaves exactly as before — no update button, no checks visible. */
const APP_VERSION = "1.0.0";
const APP_VERSION_NAME = "Foundation";
const UPDATE_MANIFEST_URL = "REPLACE_WITH_YOUR_MANIFEST_RAW_URL";

function verNewer(a,b){
  const pa=a.split('.').map(Number), pb=b.split('.').map(Number);
  for(let i=0;i<3;i++){ if((pa[i]||0)!==(pb[i]||0)) return (pa[i]||0)>(pb[i]||0); }
  return false;
}

async function checkForUpdate(){
  if(UPDATE_MANIFEST_URL.indexOf('REPLACE_WITH')===0) return; // not configured yet
  try{
    const res = await fetch(UPDATE_MANIFEST_URL + '?t=' + Date.now());
    if(!res.ok) return;
    const m = await res.json();
    if(m && m.enabled === true && m.latest_version && verNewer(m.latest_version, APP_VERSION)){
      window.__pendingUpdate = m;
      const badge = document.getElementById('updateBadge');
      document.getElementById('updateBadgeText').textContent = 'Update: ' + (m.version_name || m.latest_version);
      badge.classList.add('show');
    }
  }catch(e){ /* silent — offline or manifest unreachable, app works as normal */ }
}

async function applyUpdate(){
  const m = window.__pendingUpdate;
  if(!m || !m.download_url) return;
  const overlay = document.getElementById('updateOverlay');
  overlay.classList.add('show');
  document.getElementById('updateOverlayText').textContent = 'Downloading ' + (m.version_name || 'update') + '…';
  try{
    const res = await fetch(m.download_url + '?t=' + Date.now());
    const html = await res.text();
    document.getElementById('updateOverlayText').textContent = 'Installing…';
    setTimeout(()=>{
      document.open(); document.write(html); document.close();
    }, 500);
  }catch(e){
    document.getElementById('updateOverlayText').textContent = 'Could not reach update server. Try again later.';
    setTimeout(()=>overlay.classList.remove('show'), 2200);
  }
}

setTimeout(checkForUpdate, 1200);
</script>
